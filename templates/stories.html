<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Stories
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="stories-page">

    <!-- ================= TOP BAR ================= -->

    <div class="stories-topbar">

        <a
        href="/home"
        class="stories-back">

            ←

        </a>

        <h2>
            Stories
        </h2>

    </div>

    <!-- ================= UPLOAD CARD ================= -->

    <div class="upload-story-card">

        <h1>
            Upload Story
        </h1>

        <form

        method="POST"

        enctype="multipart/form-data"

        class="story-upload-form"

        >

            <input

            type="file"

            name="image"

            required

            class="story-file-input"

            >

            <button
            type="submit"
            class="upload-story-btn">

                Upload Story

            </button>

        </form>

    </div>

    <!-- ================= STORIES GRID ================= -->

    <div class="stories-grid">

        {% for story in stories %}

        <a

        href="/view-story/{{ story.id }}"

        class="story-link"

        >

            <div class="story-card">

                <!-- STORY IMAGE -->

                <img

                src="{{ url_for('static', filename='stories/' + story.image) }}"

                class="story-image"

                >

                <!-- USERNAME -->

                <div class="story-overlay">

                    <p>
                        {{ story.username }}
                    </p>

                </div>

            </div>

        </a>

        {% endfor %}

    </div>

</div>

</body>
</html>
