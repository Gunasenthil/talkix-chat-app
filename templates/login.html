<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body style="
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
">

<form method="POST" style="
background:#1f2937;
padding:40px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:20px;
width:300px;
">

<h1 style="color:white;">
Login
</h1>

<input
type="text"
name="username"
placeholder="Username"
required
style="
padding:15px;
border:none;
border-radius:10px;
"
>

<input
type="password"
name="password"
placeholder="Password"
required
style="
padding:15px;
border:none;
border-radius:10px;
"
>

<button
type="submit"
style="
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
"
>
Login
</button>

<a href="/register" style="color:white;">
Create Account
</a>

</form>

</body>
</html>
