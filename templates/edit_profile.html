<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Edit Profile
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="edit-page">

    <!-- ================= TOP BAR ================= -->

    <div class="edit-topbar">

        <a
        href="/profile/{{ current_user.username }}"
        class="edit-back">

            ←

        </a>

        <h2>
            Edit Profile
        </h2>

    </div>

    <!-- ================= EDIT CARD ================= -->

    <div class="edit-card">

        <!-- PROFILE PREVIEW -->

        <div class="edit-profile-preview">

            <img

            src="{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}"

            class="edit-profile-image"

            >

            <h2>
                {{ current_user.name }}
            </h2>

            <p>
                @{{ current_user.username }}
            </p>

        </div>

        <!-- FORM -->

        <form

        method="POST"

        enctype="multipart/form-data"

        class="edit-form"

        >

            <!-- NAME -->

            <label>

                Full Name

            </label>

            <input

            type="text"

            name="name"

            placeholder="Enter name"

            value="{{ current_user.name }}"

            required

            >

            <!-- BIO -->

            <label>

                Bio

            </label>

            <textarea

            name="bio"

            placeholder="Write your bio"

            rows="5"

            >{{ current_user.bio }}</textarea>

            <!-- PHOTO -->

            <label>

                Change Profile Photo

            </label>

            <input

            type="file"

            name="profile_pic"

            class="file-input"

            >

            <!-- SAVE -->

            <button
            type="submit"
            class="save-btn">

                Save Changes

            </button>

        </form>

    </div>

</div>

</body>
</html>
