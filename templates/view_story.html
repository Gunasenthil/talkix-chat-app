<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
View Story
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- ================= STORY VIEW PAGE ================= -->

<div class="story-view-page">

    <!-- BLUR BACKGROUND -->

    <div
    class="story-bg"

    style="
    background-image:url('{{ url_for('static', filename='stories/' + story.image) }}');
    "

    ></div>

    <!-- TOP BAR -->

    <div class="story-topbar">

        <a
        href="/stories"
        class="story-back-btn">

            ←

        </a>

        <div class="story-user-info">

            <h3>
                {{ story.username }}
            </h3>

            <p>
                Story
            </p>

        </div>

    </div>

    <!-- STORY CONTENT -->

    <div class="story-center">

        <img

        src="{{ url_for('static', filename='stories/' + story.image) }}"

        class="full-story-image"

        >

    </div>

    <!-- DELETE BUTTON -->

    {% if current_user.username == story.username %}

    <div class="story-actions">

        <a href="/delete-story/{{ story.id }}">

            <button class="delete-story-btn">

                🗑 Delete Story

            </button>

        </a>

    </div>

    {% endif %}

    <!-- VIEWERS -->

    {% if current_user.username == story.username %}

    <div class="viewers-box">

        <h2>
            👀 Viewers
        </h2>

        {% for v in viewers %}

        <div class="viewer-item">

            {{ v.viewer }}

        </div>

        {% endfor %}

    </div>

    {% endif %}

</div>

</body>
</html>
