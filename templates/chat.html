<!DOCTYPE html>
<html>

<head>

<title>
Talkix Chat
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="chat-page">

<!-- ================= CHAT BOX CONTAINER ================= -->

<div class="chat-main-container">

<!-- ================= HEADER ================= -->

<div class="chat-header">

    <!-- LEFT -->

    <div class="chat-header-left">

        <a
        href="/home"
        class="chat-back">

            ←

        </a>

        <a
        href="/profile/{{ user.username }}"
        class="chat-user-link">

            <img

            src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}"

            class="chat-profile"

            >

        </a>

        <div class="chat-user-info">

            <h3>
                {{ user.name }}
            </h3>

            <p>
                @{{ user.username }}
            </p>

        </div>

    </div>

</div>

<!-- ================= MESSAGES ================= -->

<div
id="chat-box"
class="messages-container">

{% for msg in messages %}

    {% if msg.sender == current_user.username %}

        <div class="message sent">

            {{ msg.message }}

        </div>

    {% else %}

        <div class="message received">

            {{ msg.message }}

        </div>

    {% endif %}

{% endfor %}

</div>

<!-- ================= INPUT AREA ================= -->

<div class="chat-input-area">

    <input

    type="text"

    id="message-input"

    placeholder="Type a message..."

    autocomplete="off"

    >

    <button

    class="send-btn"

    onclick="sendMessage()"

    >

        ➤

    </button>

</div>

</div>

</div>

<!-- ================= SOCKET.IO ================= -->

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

const socket = io();

/* ================= AUTO SCROLL ================= */

let chatBox =

document.getElementById(
"chat-box"
);

chatBox.scrollTop =
chatBox.scrollHeight;

/* ================= SEND MESSAGE ================= */

function sendMessage(){

    let input =

    document.getElementById(
    "message-input"
    );

    let message =
    input.value.trim();

    if(message === ""){

        return;

    }

    socket.emit(

        "send_message",

        {

            sender:
            "{{ current_user.username }}",

            receiver:
            "{{ username }}",

            message:
            message

        }

    );

    input.value = "";

}

/* ================= ENTER KEY ================= */

document.getElementById(
"message-input"
).addEventListener(

"keypress",

function(e){

    if(e.key === "Enter"){

        sendMessage();

    }

}

);

/* ================= RECEIVE MESSAGE ================= */

socket.on(

"receive_message",

function(data){

    if(

        (
            data.sender === "{{ username }}"
            &&
            data.receiver === "{{ current_user.username }}"
        )

        ||

        (
            data.sender === "{{ current_user.username }}"
            &&
            data.receiver === "{{ username }}"
        )

    ){

        let div =

        document.createElement(
        "div"
        );

        if(

            data.sender ===
            "{{ current_user.username }}"

        ){

            div.className =
            "message sent";

        }

        else{

            div.className =
            "message received";

        }

        div.innerHTML =
        data.message;

        chatBox.appendChild(div);

        chatBox.scrollTop =
        chatBox.scrollHeight;

    }

}

);

</script>

</body>
</html>
