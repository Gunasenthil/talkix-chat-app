<!DOCTYPE html>
<html>

<head>

    <title>Talkix Chat</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="chat-container">

    <!-- HEADER -->

    <div class="chat-header">

        <a href="/home"
        style="text-decoration:none;color:white;font-size:25px;">
            ←
        </a>

        <img
        src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}"
        class="chat-profile">

        <div>

            <h3>{{ user.name }}</h3>

            {% if user.online %}

            <p style="color:lime;">
                Online
            </p>

            {% else %}

            <p style="color:gray;">
                Last seen {{ user.last_seen }}
            </p>

            {% endif %}

            <p id="typing-box"></p>

        </div>

    </div>

    <!-- CHAT BOX -->

    <div id="chat-box" class="messages-container">

        {% for msg in messages %}

            {% if msg.sender == current_user.username %}

                <div class="message sent">

                    {{ msg.message }}

                    <div class="tick">

                        {% if msg.seen %}

                            ✓✓

                        {% else %}

                            ✓

                        {% endif %}

                    </div>

                </div>

            {% else %}

                <div class="message received">

                    {{ msg.message }}

                </div>

            {% endif %}

        {% endfor %}

    </div>

    <!-- INPUT AREA -->

    <div class="chat-input-area">

        <!-- PLUS -->

        <div class="plus-wrapper">

            <button
            class="plus-btn"
            onclick="toggleMenu()">
                +
            </button>

            <!-- POPUP MENU -->

            <div id="popup-menu"
            class="popup-menu">

                <!-- IMAGE -->

                <form
                action="/send-image"
                method="POST"
                enctype="multipart/form-data">

                    <input
                    type="hidden"
                    name="receiver"
                    value="{{ username }}">

                    <label class="popup-item">

                        🖼 Image

                        <input
                        type="file"
                        name="image"
                        hidden
                        onchange="this.form.submit()">

                    </label>

                </form>

                <!-- DOCUMENT -->

                <form
                action="/send-document"
                method="POST"
                enctype="multipart/form-data">

                    <input
                    type="hidden"
                    name="receiver"
                    value="{{ username }}">

                    <label class="popup-item">

                        📄 Document

                        <input
                        type="file"
                        name="document"
                        hidden
                        onchange="this.form.submit()">

                    </label>

                </form>

            </div>

        </div>

        <!-- MESSAGE INPUT -->

        <input
        type="text"
        id="message-input"
        placeholder="Type message...">

        <!-- MIC -->

        <button
        class="mic-btn"
        onclick="startRecording()">
            🎤
        </button>

        <!-- SEND -->

        <button
        class="send-btn"
        onclick="sendMessage()">
            ➤
        </button>

    </div>

</div>

<!-- SOCKET -->

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

const socket = io();

/* ================= SEND MESSAGE ================= */

function sendMessage(){

    let input = document.getElementById(
        "message-input"
    );

    let message = input.value;

    if(message.trim() == ""){

        return;

    }

    socket.emit(

        "send_message",

        {

            sender:
            "{{ current_user.username }}",

            receiver:
            "{{ username }}",

            message: message

        }

    );

    input.value = "";

}

/* ================= ENTER KEY ================= */

document.getElementById(
"message-input"
).addEventListener(

"keypress",

function(e){

    if(e.key === "Enter"){

        sendMessage();

    }

}

);

/* ================= RECEIVE MESSAGE ================= */

socket.on(

    "receive_message",

    function(data){

        let chatBox = document.getElementById(
            "chat-box"
        );

        let div = document.createElement(
            "div"
        );

        if(

            data.sender ==

            "{{ current_user.username }}"

        ){

            div.className = "message sent";

            div.innerHTML = `
                ${data.message}
                <div class="tick">✓</div>
            `;

        }

        else{

            div.className = "message received";

            div.innerHTML = data.message;

        }

        chatBox.appendChild(div);

        chatBox.scrollTop = chatBox.scrollHeight;

    }

);

/* ================= TYPING ================= */

const messageInput =
document.getElementById(
"message-input"
);

messageInput.addEventListener(

"input",

() => {

    socket.emit(

        "typing",

        {

            sender:
            "{{ current_user.username }}"

        }

    );

    clearTimeout(
        window.typingTimer
    );

    window.typingTimer =
    setTimeout(() => {

        socket.emit(

            "stop_typing",

            {

                sender:
                "{{ current_user.username }}"

            }

        );

    },1000);

}

);

/* ================= SHOW TYPING ================= */

socket.on(

"show_typing",

function(data){

    document.getElementById(
        "typing-box"
    ).innerHTML =

    data.sender +
    " is typing...";

}

);

/* ================= HIDE TYPING ================= */

socket.on(

"hide_typing",

function(data){

    document.getElementById(
        "typing-box"
    ).innerHTML = "";

}

);

/* ================= TOGGLE MENU ================= */

function toggleMenu(){

    let menu = document.getElementById(
        "popup-menu"
    );

    if(menu.style.display == "flex"){

        menu.style.display = "none";

    }

    else{

        menu.style.display = "flex";

    }

}

/* ================= VOICE RECORD ================= */

let mediaRecorder;

let audioChunks = [];

async function startRecording(){

    const stream =

    await navigator.mediaDevices.getUserMedia({

        audio:true

    });

    mediaRecorder =
    new MediaRecorder(stream);

    mediaRecorder.start();

    audioChunks = [];

    mediaRecorder.ondataavailable =
    event => {

        audioChunks.push(
            event.data
        );

    };

    mediaRecorder.onstop =
    async () => {

        const audioBlob =
        new Blob(

            audioChunks,

            {

                type:"audio/webm"

            }

        );

        const formData =
        new FormData();

        formData.append(

            "voice",

            audioBlob,

            "voice.webm"

        );

        formData.append(

            "receiver",

            "{{ username }}"

        );

        await fetch(

            "/send-voice",

            {

                method:"POST",

                body:formData

            }

        );

        location.reload();

    };

    setTimeout(() => {

        mediaRecorder.stop();

    },5000);

}

</script>

</body>
</html>
