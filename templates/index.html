<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Talkix
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- ================= MAIN WRAPPER ================= -->

<div class="main-wrapper">

<!-- ================= SIDEBAR ================= -->

<div class="sidebar" id="sidebar">

<div class="sidebar-top">

<img

src="{{ url_for('static', filename='applogo.png') }}"

class="sidebar-logo"

>

<h2>
Talkix
</h2>

</div>

<div class="sidebar-menu">

<a href="/profile/{{ current_user.username }}">

<div class="menu-item">

👤 Profile

</div>

</a>

<a href="/account">

<div class="menu-item">

⚙ Account

</div>

</a>

<a href="/stories">

<div class="menu-item">

🔥 Stories

</div>

</a>

<a href="/media">

<div class="menu-item">

🖼 Media

</div>

</a>

<a href="/logout">

<div class="menu-item logout">

🚪 Logout

</div>

</a>

</div>

</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="main-content">

<!-- ================= TOP BAR ================= -->

<div class="top-bar">

<div class="top-left">

<img

src="{{ url_for('static', filename='applogo.png') }}"

class="top-logo"

>

<h2>
Talkix
</h2>

</div>

<div
class="menu-btn"
onclick="toggleMenu()">

☰

</div>

</div>

<!-- ================= STORIES ================= -->

<div class="stories-container">

{% for story in stories %}

<a href="/view-story/{{ story.id }}">

<div class="story-card">

<img

src="{{ url_for('static', filename='stories/' + story.image) }}"

class="story-image"

>

<p>
{{ story.username }}
</p>

</div>

</a>

{% endfor %}

</div>

<!-- ================= SEARCH ================= -->

<div class="search-container">

<input

type="text"

id="searchInput"

placeholder="Search users..."

onkeyup="searchUser()"

>

</div>

<!-- ================= USERS ================= -->

<div
class="users-container"
id="userList">

{% for user in users %}

<div class="user-card">

<!-- PROFILE IMAGE -->

<a
href="/profile/{{ user.username }}">

<img

src="{{ url_for('static', filename='uploads/' + user.profile_pic) }}"

class="user-profile"

>

</a>

<!-- USER INFO -->

<div

class="user-info"

onclick="
window.location.href=
'/chat/{{ user.username }}'
"

>

<h3>
{{ user.name }}
</h3>

<p>
@{{ user.username }}
</p>

</div>

</div>

{% endfor %}

</div>

</div>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

/* ================= SEARCH ================= */

function searchUser(){

let input =

document.getElementById(
"searchInput"
).value.toLowerCase();

let users =

document.getElementsByClassName(
"user-card"
);

for(let i=0;i<users.length;i++){

let text =

users[i]
.innerText
.toLowerCase();

if(text.includes(input)){

users[i].style.display =
"flex";

}

else{

users[i].style.display =
"none";

}

}

}

/* ================= MENU ================= */

function toggleMenu(){

document
.getElementById("sidebar")
.classList.toggle("show-sidebar");

}

</script>

</body>
</html>
