<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Account
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="account-page">

    <!-- ================= TOP BAR ================= -->

    <div class="account-topbar">

        <a
        href="/home"
        class="account-back">

            ←

        </a>

        <h2>
            Account
        </h2>

    </div>

    <!-- ================= ACCOUNT CARD ================= -->

    <div class="account-card">

        <!-- PROFILE IMAGE -->

        <img

        src="{{ url_for('static', filename='uploads/' + current_user.profile_pic) }}"

        class="account-profile"

        >

        <!-- NAME -->

        <h1>
            {{ current_user.name }}
        </h1>

        <!-- USERNAME -->

        <p class="account-username">

            @{{ current_user.username }}

        </p>

        <!-- BIO -->

        <p class="account-bio">

            {{ current_user.bio }}

        </p>

        <!-- INFO BOXES -->

        <div class="account-info-box">

            <span>
                📧 Email
            </span>

            <p>
                {{ current_user.email }}
            </p>

        </div>

        <div class="account-info-box">

            <span>
                📱 Phone
            </span>

            <p>
                {{ current_user.phone }}
            </p>

        </div>

        <div class="account-info-box">

            <span>
                🎂 Date Of Birth
            </span>

            <p>
                {{ current_user.dob }}
            </p>

        </div>

        <div class="account-info-box">

            <span>
                ⚧ Gender
            </span>

            <p>
                {{ current_user.gender }}
            </p>

        </div>

        <!-- BUTTONS -->

        <div class="account-buttons">

            <a href="/edit-profile">

                <button class="edit-account-btn">

                    Edit Profile

                </button>

            </a>

            <a href="/logout">

                <button class="logout-account-btn">

                    Logout

                </button>

            </a>

        </div>

    </div>

</div>

</body>
</html>
