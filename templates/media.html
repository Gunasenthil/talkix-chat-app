<!DOCTYPE html>
<html>

<head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Media
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="media-page">

    <!-- ================= TOP BAR ================= -->

    <div class="media-topbar">

        <a
        href="/home"
        class="media-back">

            ←

        </a>

        <h2>
            Media
        </h2>

    </div>

    <!-- ================= IMAGE SECTION ================= -->

    <div class="media-section">

        <h1>
            Images
        </h1>

        <div class="media-grid">

            {% for img in images %}

            <img

            src="{{ url_for('static', filename='chat_media/' + img.image) }}"

            class="media-image"

            >

            {% endfor %}

        </div>

    </div>

    <!-- ================= VOICE SECTION ================= -->

    <div class="media-section">

        <h1>
            Voice Messages
        </h1>

        {% for v in voices %}

        <div class="voice-card">

            <audio controls>

                <source

                src="{{ url_for('static', filename='voice_notes/' + v.voice) }}"

                >

            </audio>

        </div>

        {% endfor %}

    </div>

    <!-- ================= DOCUMENT SECTION ================= -->

    <div class="media-section">

        <h1>
            Documents
        </h1>

        {% for d in documents %}

        <a

        href="{{ url_for('static', filename='documents/' + d.document) }}"

        target="_blank"

        class="document-card"

        >

            📄 {{ d.document }}

        </a>

        {% endfor %}

    </div>

    <!-- ================= LINK SECTION ================= -->

    <div class="media-section">

        <h1>
            Links
        </h1>

        {% for l in links %}

        <a

        href="{{ l.link }}"

        target="_blank"

        class="link-card"

        >

            🔗 {{ l.link }}

        </a>

        {% endfor %}

    </div>

</div>

</body>
</html>
