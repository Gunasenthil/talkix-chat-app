<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Register
</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- ================= REGISTER PAGE ================= -->

<div class="register-page">

    <!-- GLOW EFFECT -->

    <div class="register-glow1"></div>

    <div class="register-glow2"></div>

    <!-- REGISTER CARD -->

    <form

    method="POST"

    enctype="multipart/form-data"

    class="register-card"

    >

        <!-- LOGO -->

        <img

        src="{{ url_for('static', filename='applogo.png') }}"

        class="register-logo"

        >

        <!-- TITLE -->

        <h1>
            Create Account
        </h1>

        <p class="register-subtitle">

            Join Talkix and start chatting

        </p>

        <!-- EMAIL -->

        <input

        type="email"

        name="email"

        placeholder="Enter Gmail"

        required

        >

        <!-- SEND OTP -->

        <button

        type="button"

        onclick="sendOTP()"

        class="otp-btn"

        >

            Send OTP

        </button>

        <!-- OTP -->

        <input

        type="text"

        name="otp"

        placeholder="Enter OTP"

        required

        >

        <!-- USERNAME -->

        <input

        type="text"

        name="username"

        placeholder="Username"

        required

        >

        <!-- DATE -->

        <input

        type="date"

        name="dob"

        required

        >

        <!-- GENDER -->

        <select

        name="gender"

        required

        >

            <option value="">
                Select Gender
            </option>

            <option>
                Male
            </option>

            <option>
                Female
            </option>

            <option>
                Other
            </option>

        </select>

        <!-- PROFILE PHOTO -->

        <div class="upload-box">

            <label>

                Upload Profile Photo

            </label>

            <input

            type="file"

            name="profile_pic"

            required

            >

        </div>

        <!-- PASSWORD -->

        <input

        type="password"

        name="password"

        placeholder="Password"

        required

        >

        <!-- SUBMIT -->

        <button
        type="submit"
        class="register-btn">

            Create Account

        </button>

        <!-- LOGIN -->

        <a
        href="/login"
        class="login-link">

            Already have account?

        </a>

    </form>

</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

async function sendOTP(){

    let response =

    await fetch("/send-otp");

    let otp =

    await response.text();

    alert(
    "Your OTP is: " + otp
    );

}

</script>

</body>
</html>
